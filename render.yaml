services:
  - type: web
    name: mtn-momo-telegram-bot
    env: node
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MOMO_COLLECTIONS_PRIMARY_KEY
        sync: false
      - key: MOMO_COLLECTIONS_USER_ID
        sync: false
      - key: MOMO_COLLECTIONS_API_KEY
        sync: false
      - key: MOMO_DISBURSEMENTS_PRIMARY_KEY
        sync: false
      - key: MOMO_DISBURSEMENTS_USER_ID
        sync: false
      - key: MOMO_DISBURSEMENTS_API_KEY
        sync: false
      - key: MOMO_ENV
        value: sandbox
      - key: MOMO_BASE_URL
        value: https://sandbox.momodeveloper.mtn.com
      - key: MOMO_CURRENCY
        value: EUR
      - key: MOMO_TARGET_ENVIRONMENT
        value: sandbox
      - key: WEBHOOK_URL
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: DB_PATH
        value: ./data/bot.db
